<style>
:root{--bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--bg4:#242430;--border:#2e2e3a;--border2:#3a3a4a;--text:#e8e4dc;--text2:#9990a0;--text3:#5a5468;--accent:#c8954a;--accent2:#e8b86d;--red:#d95f5f;--red2:#f07878;--green:#5aaa7a;--green2:#7acc96;--gold:#d4af6a;--gold2:#f0cc88;--purple:#8b6aaa;--radius:12px;--radius2:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans SC",sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 20% 20%,rgba(200,149,74,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(139,106,170,.04) 0%,transparent 50%);pointer-events:none;z-index:0}

.nav-title{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700;color:var(--accent2);letter-spacing:.1em;flex:1}
.nav-title span{color:var(--text3);font-size:11px;font-weight:400;margin-left:6px;font-family:"Noto Sans SC";letter-spacing:0}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:6px 12px;border-radius:var(--radius2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;transition:all .2s}
.nav-tab.active{background:var(--bg3);color:var(--accent2)}
.page{display:none;padding:16px;position:relative;z-index:1}
.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-family:"Noto Serif SC",serif;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:var(--radius2);font-family:"Noto Sans SC";font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;gap:6px}
.btn-primary{background:var(--accent);color:#0d0d0f}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(217,95,95,.15);color:var(--red2);border:1px solid rgba(217,95,95,.3)}
.btn-sm{padding:6px 12px;font-size:12px}.btn-full{width:100%}.btn:disabled{opacity:.4;cursor:not-allowed}
.input-group{margin-bottom:14px}
.input-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);color:var(--text);font-family:"Noto Sans SC";font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg3)}
.score-display{font-family:"Playfair Display",serif;font-size:56px;font-weight:700;text-align:center;line-height:1;margin:8px 0 4px;transition:color .3s}
.score-label{text-align:center;font-size:12px;color:var(--text2);margin-bottom:16px;height:18px}
.slider-wrap{padding:0 4px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;padding:0;background:var(--bg4);border-radius:3px;border:none;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(200,149,74,.2)}
.score-ticks{display:flex;justify-content:space-between;padding:4px 2px 0;font-size:10px;color:var(--text3)}
.players-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.player-chip{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;user-select:none}
.player-chip.dealer{border-color:var(--gold);background:rgba(212,175,106,.08)}
.player-chip.helper{border-color:var(--purple);background:rgba(139,106,170,.08)}
.player-chip.farmer{border-color:var(--green);background:rgba(90,170,122,.08)}
.player-chip .chip-name{font-size:12px;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.player-chip.dealer .chip-role{background:var(--gold);color:#0d0d0f}

.room-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:10px 14px;margin-bottom:12px}

.code-input{letter-spacing:.2em;font-family:"Playfair Display";font-size:20px;text-align:center;text-transform:uppercase}
.hist-session{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.hist-session:hover{border-color:var(--border2)}
.hist-session-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hist-session-date{font-size:13px;font-weight:500;flex:1}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}

.radio-btn.selected{border-color:var(--accent);background:rgba(200,149,74,.1);color:var(--accent2)}

<script>
// ══════ LEVEL SYSTEM ══════
// Flat linear sequence. B3:2 < B2:2 < B1:2 < R1:2 < R1:4 < ... < R1:A < R2:2 < ...
// A "key" is a string like "R1:A" or "B2:2"
// We build a flat ordered array and index into it.

const LEVEL_NAMES = ['2','4','6','7','8','9','10','J','Q','K','A']; // 11 levels
const REGULAR_ROUNDS = ['R1','R2','R3','R4','R5'];
const BASEMENT_ROUNDS = ['B1','B2','B3','B4','B5','B6','B7','B8','B9','B10']; // B1 closest to surface

// Build flat sequence
function buildSequence() {
  const seq = [];
  // Basement: deepest first so index increases going up
  // B5:2, B4:2, B3:2, B2:2, B1:2, R1:2, R1:4, ... R1:A, R2:2, ...
  for (let i = BASEMENT_ROUNDS.length - 1; i >= 0; i--) {
    seq.push(BASEMENT_ROUNDS[i] + ':2');
  }
  for (const r of REGULAR_ROUNDS) {
    for (const l of LEVEL_NAMES) {
      seq.push(r + ':' + l);
    }
  }
  return seq;
}
const LEVEL_SEQ = buildSequence();
// LEVEL_SEQ[0] = B5:2 (deepest basement)
// LEVEL_SEQ[4] = B1:2 (shallowest basement)
// LEVEL_SEQ[5] = R1:2 (start)
// LEVEL_SEQ[15] = R1:A
// LEVEL_SEQ[16] = R2:2

const START_KEY = 'R1:2';

function keyIndex(key) { return LEVEL_SEQ.indexOf(key); }

function stepLevel(key, steps) {
  let idx = keyIndex(key);
  if (idx === -1) idx = keyIndex(START_KEY);
  idx = Math.max(0, Math.min(LEVEL_SEQ.length - 1, idx + steps));
  return LEVEL_SEQ[idx];
}

function levelDisplay(key) {
  if (!key) return '?';
  const col = key.indexOf(':');
  const round = key.slice(0, col);
  const level = key.slice(col + 1);
  if (round === 'R1') return level;
  if (round.startsWith('R')) return `${level}(第${round.slice(1)}轮)`;
  // Basement: B1 = 地下1, B2 = 地下2, etc.
  return `${level}(地下${round.slice(1)})`;
}

function isBasement(key) {
  return key && key.startsWith('B');
}

// ══════ STATE ══════

// saveState defined below with room sync
function loadState() {
  try {
    const raw = localStorage.getItem('sj_v3');
    if (raw) {
      const loaded = JSON.parse(raw);
      // Keep embedded avatars and names as defaults
      const defaults = getDefaultPlayers();
      loaded.players = loaded.players.map((p, i) => ({
        ...p,
        avatar: p.avatar || (defaults[i] && defaults[i].avatar) || null,
        name: p.name || (defaults[i] && defaults[i].name) || `P${i+1}`,
      }));
      state = loaded;
    }
  } catch(e) {}
}

function getDefaultPlayers() {
  return state.players; // already set from embedded data
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `shengji_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url); showToast('已导出存档 📁');
}
function importData(file) {
  const r = new FileReader();
  r.onload = e => { try { state=JSON.parse(e.target.result); saveState(); renderAll(); showToast('已导入 ✅'); } catch(e){ showToast('格式错误 ❌'); } };
  r.readAsText(file);
}

// ══════ SCORE LOGIC ══════
function getScoreResult(score) {
  // Level changes only — 120-175 is no change for both sides
  if (score === 0)  return {side:'dealer', levels:3};
  if (score <= 55)  return {side:'dealer', levels:2};
  if (score <= 115) return {side:'dealer', levels:1};
  if (score <= 175) return {side:'none',   levels:0};
  if (score <= 235) return {side:'farmer', levels:1};
  if (score <= 295) return {side:'farmer', levels:2};
  return                   {side:'farmer', levels:3};
}
function getScoreWinner(score) {
  // Win/loss for statistics — 120-175 counts as Farmer win (no levels but a win)
  if (score === 0)  return 'dealer';
  if (score <= 55)  return 'dealer';
  if (score <= 115) return 'dealer';
  if (score <= 175) return 'farmer';  // NEW: farmer win, 0 levels
  if (score <= 235) return 'farmer';
  if (score <= 295) return 'farmer';
  return                   'farmer';
}
function getScoreLabel(s) {
  if (s===0) return '大光头 💀';
  if (s<=59) return '小光头 😬';
  if (s<=115) return '庄家胜';
  if (s<=175) return '农民胜(0级)';
  if (s<=239) return '小跳 🎉';
  if (s<=299) return '大跳 🚀';
  return '超级跳 🌟';
}
function getScoreColor(s) {
  if (s<=115) return 'var(--gold2)';
  if (s<=175) return 'var(--text2)';
  return 'var(--green2)';
}

function computeLevelChanges(round, session) {
  const {dealerId, helperIds, score, heartFiveCaptors, diamondFiveCaptors, penalties} = round;
  const dealerSide = [dealerId, ...helperIds];
  const farmerIds = session.players.filter(p => p !== dealerId && !helperIds.includes(p));
  const result = getScoreResult(score);
  const changes = {}; session.players.forEach(p => changes[p] = 0);

  if (result.side === 'dealer') dealerSide.forEach(p => changes[p] += result.levels);
  else if (result.side === 'farmer') farmerIds.forEach(p => changes[p] += result.levels);

  const hCount = (heartFiveCaptors||[]).length;
  const dCount = (diamondFiveCaptors||[]).length;
  if (hCount > 0) dealerSide.forEach(p => changes[p] -= 2 * hCount);
  if (dCount > 0) dealerSide.forEach(p => changes[p] -= 1 * dCount);

  Object.entries(penalties||{}).forEach(([pid, cnt]) => { changes[parseInt(pid)] -= cnt; });
  return changes;
}

function applyLevelChanges(session, changes) {
  const nL = {...session.playerLevels};
  Object.entries(changes).forEach(([pid, delta]) => {
    nL[parseInt(pid)] = stepLevel(nL[parseInt(pid)] || START_KEY, delta);
  });
  return nL;
}

// ══════ ACHIEVEMENTS ══════
function computeAchievements(round, session, levelsBefore, levelsAfter) {
  const {dealerId, helperIds, score, heartFiveCaptors, diamondFiveCaptors, penalties} = round;
  const result = getScoreResult(score);
  const dealerSide = [dealerId, ...helperIds];
  const farmerIds = session.players.filter(p => p !== dealerId && !helperIds.includes(p));
  const achs = [];
  const ach = (name, color, pid=null) => achs.push({name, color, pid});

  // Fix 1: Score achievements assigned to winning side players
  if (score === 0) {
    dealerSide.forEach(pid => ach('大光头', 'red', pid));
  } else if (score <= 59) {
    dealerSide.forEach(pid => ach('小光头', 'red', pid));
  }
  if (score >= 300) {
    farmerIds.forEach(pid => ach('超级跳', 'green', pid));
  } else if (score >= 240) {
    farmerIds.forEach(pid => ach('大跳', 'green', pid));
  } else if (score >= 180) {
    farmerIds.forEach(pid => ach('小跳', 'green', pid));
  }

  // Red five captures — credited to captor
  (heartFiveCaptors||[]).forEach(pid => ach('抓住红五♥', 'red', pid));
  (diamondFiveCaptors||[]).forEach(pid => ach('抓住方五♦', 'gold', pid));

  // 坏了坏了: dealer side lost AND red five captured — assigned to all dealer side
  const rfCaptured = (heartFiveCaptors||[]).length + (diamondFiveCaptors||[]).length > 0;
  // 坏了坏了: red five captured AND dealer side did not win level-wise
  if (rfCaptured && result.side !== 'dealer') {
    dealerSide.forEach(pid => ach('坏了坏了', 'red', pid));
  }

  // Team composition
  if (helperIds.length === 0) {
    ach('How dare you?', 'purple', dealerId);
    if (result.side === 'dealer') ach('Lone Wolf', 'gold', dealerId);
  } else if (helperIds.length === 1) {
    ach('浪漫双人车驾驶员', 'purple', dealerId);
    ach('浪漫双人车乘客', 'purple', helperIds[0]);
  }

  // Fix 2: 虚惊一场 — got penalty but did NOT level down (includes no change AND level up)
  Object.entries(penalties||{}).forEach(([pidStr, cnt]) => {
    const pid = parseInt(pidStr);
    if (cnt >= 2) ach('手残党', 'red', pid);
    if (cnt > 0 && levelsAfter[pid] === levelsBefore[pid]) ach('虚惊一场', 'purple', pid);
  });

  // Dealer streak milestones: award exactly once at streak lengths 3,5,7,9
  if (result.side === 'dealer') {
    let streak = 1;
    for (let i = session.rounds.length - 1; i >= 0; i--) {
      if (session.rounds[i].dealerId === dealerId) streak++;
      else break;
    }
    // Only award the achievement for the exact milestone round, not every round above it
    if (streak === 9) ach('我要验牌', 'gold', dealerId);
    else if (streak === 7) ach('一个人玩儿得了', 'gold', dealerId);
    else if (streak === 5) ach('不倒翁', 'gold', dealerId);
    else if (streak === 3) ach('房东收租', 'gold', dealerId);
  }

  // Redemption arc
  session.players.forEach(pid => {
    const before = levelsBefore[pid]||'';
    const after = levelsAfter[pid]||'';
    if (isBasement(before) && !isBasement(after)) ach('Redemption Arc', 'green', pid);
  });

  return achs;
}

function computeSessionAchievements(session) {
  const achs = [];
  const c = {}; session.players.forEach(p => c[p]={d:0,h:0,f:0});
  session.rounds.forEach(r => {
    c[r.dealerId].d++;
    r.helperIds.forEach(h => c[h].h++);
    session.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p)).forEach(f=>c[f].f++);
  });
  const maxD=Math.max(...Object.values(c).map(x=>x.d));
  const maxH=Math.max(...Object.values(c).map(x=>x.h));
  const maxF=Math.max(...Object.values(c).map(x=>x.f));
  if(maxD>0) Object.entries(c).filter(([,v])=>v.d===maxD).forEach(([p])=>achs.push({pid:parseInt(p),name:'大地主',color:'gold'}));
  if(maxH>0) Object.entries(c).filter(([,v])=>v.h===maxH).forEach(([p])=>achs.push({pid:parseInt(p),name:'好帮手',color:'purple'}));
  if(maxF>0) Object.entries(c).filter(([,v])=>v.f===maxF).forEach(([p])=>achs.push({pid:parseInt(p),name:'老农民',color:'green'}));
  // 过客: was Dealer at least once but never stayed consecutive — Dealer role only
  session.players.forEach(p => {
    if (c[p].d === 0) return; // never was dealer, skip
    let stayed=false;
    for(let i=1;i<session.rounds.length;i++){
      if(session.rounds[i].dealerId===p && session.rounds[i-1].dealerId===p){stayed=true;break;}
    }
    if(!stayed) achs.push({pid:p,name:'过客',color:'purple'});
  });
  return achs;
}

function renderHistoryList() {
  if (!state.sessions.length) return '';
  const sorted = [...state.sessions].reverse();
  const cards = sorted.map((s, i) => {
    const realIdx = state.sessions.length - 1 - i;
    const date = new Date(s.startTime).toLocaleDateString('zh', {month:'short',day:'numeric',year:'numeric'});
    const dealerWins = s.rounds.filter(r=>getScoreWinner(r.score)==='dealer').length;
    const farmerWins = s.rounds.filter(r=>getScoreWinner(r.score)==='farmer').length;
    const endGoal = s.endKey ? levelDisplay(s.endKey) : '—';
    return `<div class="hist-session" onclick="openHistSession(${realIdx})">
      <div class="hist-session-header">
        <div class="hist-session-date">📅 ${date}</div>
        <div class="hist-session-meta">${s.rounds.length} 局</div>
      </div>
      <div style="font-size:11px;color:var(--text3);display:flex;gap:12px">
        <span>庄胜 <b style="color:var(--gold2)">${dealerWins}</b></span>
        <span>农胜 <b style="color:var(--green2)">${farmerWins}</b></span>
        <span>终局目标 <b style="color:var(--accent2)">${endGoal}</b></span>
      </div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-title">历史局</div>${cards}</div>`;
}

  renderHistSessionModal(idx);

}

      ${levelRows}

function openHistRoundDetail(sessionIdx, roundId) {
  const s = state.sessions[sessionIdx];
  if (!s) return;
  const r = s.rounds.find(r=>r.id===roundId);
  if (!r) return;
  const result = getScoreResult(r.score);
  const bannerCls = result.side==='dealer'?'dealer-win':result.side==='farmer'?'farmer-win':'no-change';
  const bannerTitle = result.side==='dealer'?'庄家方胜利':result.side==='farmer'?'农民方胜利':'平局';
  const helpers = r.helperIds.map(h=>pName(h)).join('、')||'无';
  const farmers = s.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p)).map(p=>pName(p)).join('、');
  const levelRows = s.players.map(pid=>{
    const before=r.levelsBefore[pid]; const after=r.levelsAfter[pid]; const delta=r.changes[pid];
    const arrow=delta>0?`<span style="color:var(--green2)">▲${delta}</span>`:delta<0?`<span style="color:var(--red2)">▼${Math.abs(delta)}</span>`:`<span style="color:var(--text3)">—</span>`;
    return `<div class="stat-row"><div style="flex:1;font-size:13px">${pName(pid)}</div><div style="font-size:12px;color:var(--text3);margin-right:6px">${levelDisplay(before)}→${levelDisplay(after)}</div>${arrow}</div>`;
  }).join('');
  const achTags=(r.achievements||[]).map(a=>`<span class="ach-tag ${a.color}">${a.pid!=null?pName(a.pid)+'·':''}${a.name}</span>`).join('')||'<span style="color:var(--text3);font-size:12px">无成就</span>';

  document.getElementById('roundDetailContent').innerHTML=`
    <div class="modal-title">第 ${roundId+1} 局详情</div>
    <div class="result-banner ${bannerCls}"><div class="result-title">${bannerTitle}</div><div class="result-detail">农民得分：${r.score}</div></div>
    <div class="card-title">人员</div>
    <div style="font-size:13px;margin-bottom:12px">庄家：${pName(r.dealerId)}<br>帮手：${helpers}<br>农民：${farmers}</div>
    <div class="card-title">级别变化</div>${levelRows}
    <div class="card-title" style="margin-top:12px">成就</div>
    <div class="round-achievements" style="margin-bottom:16px">${achTags}</div>
    <button class="btn btn-danger btn-sm" onclick="editHistRound(${sessionIdx},${roundId})">✏️ 编辑本局</button>`;
  openModal('modalRoundDetail');
}

function editHistRound(sessionIdx, roundId) {
  const s = state.sessions[sessionIdx];
  if (!s) return;
  const r = s.rounds.find(r=>r.id===roundId);
  if (!r) return;
  // Trim rounds after this one, revert levels to before this round
  s.rounds = s.rounds.slice(0, roundId);
  s.playerLevels = {...r.levelsBefore};
  s.currentDealerId = r.dealerId;
  // Move to current session
  state.sessions.splice(sessionIdx, 1);
  state.currentSession = s;
  // Prefill form
  roundForm.dealerId = r.dealerId;
  roundForm.helperIds = [...r.helperIds];
  roundForm.score = r.score;
  roundForm.heartFiveCaptors = [...(r.heartFiveCaptors||[])];
  roundForm.diamondFiveCaptors = [...(r.diamondFiveCaptors||[])];
  roundForm.penalties = {...r.penalties};
  closeModal('modalRoundDetail');
  closeModal('modalHistSession');
  saveState();
  showPage('round', document.querySelectorAll('.nav-tab')[1]);
  showToast('正在编辑历史局 ✏️');
}

function continueHistSession(idx) {
  if (state.currentSession) {
    showToast('请先结束当前局 ❌'); return;
  }
  const s = state.sessions[idx];
  if (!s) return;
  state.currentSession = {...s};
  state.sessions.splice(idx, 1);
  saveState();
  closeModal('modalHistSession');
  resetRoundForm();
  renderAll();
  showToast('已载入历史局，继续！▶');
}

function deleteHistSession(idx) {
  if (!confirm('确定删除这局历史记录？此操作不可撤销。')) return;
  state.sessions.splice(idx, 1);
  saveState();
  closeModal('modalHistSession');
  renderHome();
  showToast('已删除 🗑️');
}

function renderWinRates(allRounds) {
  const s={};
  state.players.forEach(p=>s[p.id]={dW:0,dT:0,dScore:0,hW:0,hT:0,hScore:0,fW:0,fT:0,fScore:0});
  allRounds.forEach(r=>{
    const res=getScoreResult(r.score);
    const fIds=r.session.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p));
    const winner=getScoreWinner(r.score);
    const dW=winner==='dealer',fW=winner==='farmer';
    const ds=s[r.dealerId];
    if(ds){ds.dT++;if(dW)ds.dW++;ds.dScore+=r.score;}
    r.helperIds.forEach(h=>{if(s[h]){s[h].hT++;if(dW)s[h].hW++;s[h].hScore+=r.score;}});
    fIds.forEach(f=>{if(s[f]){s[f].fT++;if(fW)s[f].fW++;s[f].fScore+=r.score;}});
  });
  const pct=(w,t)=>t===0?'—':Math.round(w/t*100)+'%';
  const avg=(score,t)=>t===0?'—':Math.round(score/t)+'';

  const makeCard = (label, wk, tk, sk) => `
    <div class="card">
      <div class="card-title">${label}</div>
      <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:4px 12px;align-items:center">
        <div style="font-size:10px;color:var(--text3)">玩家</div>
        <div style="font-size:10px;color:var(--text3);text-align:right">胜率</div>
        <div style="font-size:10px;color:var(--text3);text-align:right">W/T</div>
        <div style="font-size:10px;color:var(--text3);text-align:right">均分</div>
        ${state.players.map(p=>`
        <div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-top:1px solid var(--border)">
          <div class="player-avatar" style="width:24px;height:24px;font-size:11px;flex-shrink:0">${pAvatar(p.id)}</div>
          <span style="font-size:13px">${p.name}</span>
        </div>
        <div style="font-family:'Playfair Display';font-size:15px;color:var(--accent2);text-align:right;border-top:1px solid var(--border);padding:6px 0">${pct(s[p.id][wk],s[p.id][tk])}</div>
        <div style="font-size:11px;color:var(--text3);text-align:right;border-top:1px solid var(--border);padding:6px 0">${s[p.id][wk]}/${s[p.id][tk]}</div>
        <div style="font-family:'Playfair Display';font-size:15px;color:var(--gold2);text-align:right;border-top:1px solid var(--border);padding:6px 0">${avg(s[p.id][sk],s[p.id][tk])}</div>
        `).join('')}
      </div>
    </div>`;

  return makeCard('庄家','dW','dT','dScore') +
         makeCard('帮手','hW','hT','hScore') +
         makeCard('农民','fW','fT','fScore');
}


function renderLevelChart() {
  const s=state.currentSession;
  if(!s||!s.rounds.length) return '<div class="empty"><div class="empty-icon">📈</div><p>本局暂无数据</p></div>';
  const colors=['#c8954a','#8b6aaa','#5aaa7a','#d95f5f','#5a9fd4','#d4af6a'];
  const PAD_L=64, PAD_R=100, PAD_T=16, PAD_B=28;
  const W=Math.max(420, s.rounds.length*52+PAD_L+PAD_R);
  const H=220;
  const chartW=W-PAD_L-PAD_R, chartH=H-PAD_T-PAD_B;

  // Build history snapshots
  // history[0] = start, history[i] = after round i
  const initSnap = s.initialLevels || Object.fromEntries(s.players.map(p=>[p, START_KEY]));
  const history=[{...initSnap}];
  let cur={...initSnap};
  // Rebuild from stored levelsAfter snapshots for accuracy
  s.rounds.forEach(r=>{
    const snap = r.levelsAfter || (() => {
      const c=computeLevelChanges(r,s); return applyLevelChanges({...s, playerLevels: cur}, c);
    })();
    history.push({...snap});
    cur = {...snap};
  });

  // All level keys that appear, sorted
  const allKeys=new Set();
  history.forEach(h=>Object.values(h).forEach(k=>allKeys.add(k)));
  const sortedKeys=[...allKeys].sort((a,b)=>keyIndex(a)-keyIndex(b));
  const nKeys=sortedKeys.length;

  const yOf=k=>{
    const i=sortedKeys.indexOf(k);
    return PAD_T + chartH - (i/Math.max(nKeys-1,1))*chartH;
  };
  const xOf=i=>PAD_L + (i/Math.max(history.length-1,1))*chartW;

  // Y-axis grid lines and labels
  const gridLines = sortedKeys.map(k=>{
    const y=yOf(k);
    return `<line x1="${PAD_L}" y1="${y}" x2="${PAD_L+chartW}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,4"/>
            <text x="${PAD_L-6}" y="${y+4}" fill="var(--text3)" font-size="9" text-anchor="end" font-family="Noto Sans SC">${levelDisplay(k)}</text>`;
  }).join('');

  // X-axis round labels
  const xLabels=history.map((_,i)=>i>0?
    `<text x="${xOf(i)}" y="${H-4}" fill="var(--text3)" font-size="9" text-anchor="middle">#${i}</text>`:''
  ).join('');

  // Player lines + dots
  const paths=state.players.map((p,pi)=>{
    const pts=history.map((h,i)=>`${xOf(i)},${yOf(h[p.id]||START_KEY)}`);
    const dots=history.map((h,i)=>`<circle cx="${xOf(i)}" cy="${yOf(h[p.id]||START_KEY)}" r="${i===history.length-1?5:3}" fill="${colors[pi]}" stroke="${i===history.length-1?'var(--bg2)':'none'}" stroke-width="2"/>`).join('');
    return `<polyline points="${pts.join(' ')}" fill="none" stroke="${colors[pi]}" stroke-width="2.5" stroke-linejoin="round" opacity=".9"/>${dots}`;
  }).join('');

  // Current level labels on right side (sorted by current level desc to avoid overlap)
  const currentLabels = state.players
    .map((p,pi)=>({p,pi,lk:cur[p.id]||START_KEY,y:yOf(cur[p.id]||START_KEY)}))
    .sort((a,b)=>b.y-a.y);
  // Nudge labels that are too close
  for(let i=1;i<currentLabels.length;i++){
    if(currentLabels[i-1].y - currentLabels[i].y < 13)
      currentLabels[i].y = currentLabels[i-1].y - 13;
  }
  const rightLabels = currentLabels.map(({p,pi,lk,y})=>
    `<text x="${PAD_L+chartW+8}" y="${y+4}" fill="${colors[pi]}" font-size="10" font-family="Noto Sans SC" font-weight="600">${p.name}</text>`
  ).join('');

  // Legend at top
  const legend=state.players.map((p,pi)=>
    `<text x="${PAD_L + pi*Math.floor(chartW/6)}" y="10" fill="${colors[pi]}" font-size="9" font-family="Noto Sans SC">● ${p.name}</text>`
  ).join('');

  return `<div class="card">
    <div class="card-title">级别走势（本局）</div>
    <div class="level-chart">
      <svg width="${W}" height="${H}" style="overflow:visible;display:block">
        ${gridLines}
        ${paths}
        ${xLabels}
        ${rightLabels}
        ${legend}
      </svg>
    </div>
  </div>`;
}


function renderAchStats(allRounds) {
  const ac={};state.players.forEach(p=>ac[p.id]={});
  allRounds.forEach(r=>{(r.achievements||[]).forEach(a=>{if(a.pid!=null){if(!ac[a.pid])ac[a.pid]={};ac[a.pid][a.name]=(ac[a.pid][a.name]||0)+1;}});});
  return state.players.map(p=>{
    const entries=Object.entries(ac[p.id]||{}).sort((a,b)=>b[1]-a[1]);
    if(!entries.length) return '';

function moveSeat(pid, dir) {
  const sorted = [...state.players].sort((a,b) => a.seat - b.seat);
  const idx = sorted.findIndex(p => p.id === pid);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const tmp = sorted[idx].seat;
  sorted[idx].seat = sorted[swapIdx].seat;
  sorted[swapIdx].seat = tmp;
  saveState();
  renderSettings();
}

function changeRedFive(type, delta) {
  const arr = type==='heart'?'heartFiveCaptors':'diamondFiveCaptors';
  const newCount = Math.max(0, Math.min(3, roundForm[arr].length + delta));
  roundForm[arr] = roundForm[arr].slice(0, newCount);
  while(roundForm[arr].length < newCount) roundForm[arr].push(null);
  renderRound();
}

function setCaptor(type, idx, pid) {
  const arr = type==='heart'?'heartFiveCaptors':'diamondFiveCaptors';
  roundForm[arr][idx] = pid;
  renderRound();
}

function changePenalty(pid, delta) {
  roundForm.penalties[pid] = Math.max(0, (roundForm.penalties[pid]||0) + delta);
  renderRound();
}

function submitRound() {
  const s = state.currentSession; if(!s) return;
  if(roundForm.dealerId===null){showToast('请选择庄家 ❌');return;}
  if(roundForm.heartFiveCaptors.some(c=>c===null)){showToast('请选择所有♥5的抓牌者 ❌');return;}
  if(roundForm.diamondFiveCaptors.some(c=>c===null)){showToast('请选择所有♦5的抓牌者 ❌');return;}

  const levelsBefore = {...s.playerLevels};
  const rd = {
    dealerId:roundForm.dealerId, helperIds:[...roundForm.helperIds],
    score:roundForm.score, heartFiveCaptors:[...roundForm.heartFiveCaptors],
    diamondFiveCaptors:[...roundForm.diamondFiveCaptors], penalties:{...roundForm.penalties}
  };
  const changes = computeLevelChanges(rd, s);
  const levelsAfter = applyLevelChanges(s, changes);
  const achievements = computeAchievements(rd, s, levelsBefore, levelsAfter);
  const round = {...rd, id:s.rounds.length, achievements, levelsBefore, levelsAfter, changes, timestamp:Date.now()};
  s.rounds.push(round); s.playerLevels = levelsAfter;

  // Advance dealer
  const result = getScoreResult(roundForm.score);
  if(result.side !== 'dealer') {
    const sorted = [...state.players].sort((a,b)=>a.seat-b.seat);
    const ci = sorted.findIndex(p=>p.id===roundForm.dealerId);
    s.currentDealerId = sorted[(ci+1)%sorted.length].id;
  } else { s.currentDealerId = roundForm.dealerId; }

  // Check session end
  let ended = false;
  state.players.forEach(p => { if((levelsAfter[p.id]||'')===s.endKey) ended=true; });

  saveState(); resetRoundForm();
  if(ended){endSession();showToast('🎊 达到终局条件！');}
  else{showToast(`✅ 已记录第${s.rounds.length}局`);}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
  renderHome();
}

  if(!state.currentSession) return;
  state.sessions.push({...state.currentSession});
  state.currentSession=null; saveState(); renderAll(); showToast('本局已存档 📚');
}

// ══════ SHARE SESSION ══════
function shareSession() {

  if (!s) return;

function shareHistSession(idx) {
  const s = state.sessions[idx];

function encodeAndCopyLink(session, label) {
  try {
    const payload = {
      session,
      players: state.players.map(p => ({id:p.id, name:p.name, seat:p.seat}))
    };
    const jsonStr = JSON.stringify(payload);
    // Compress with pako (zlib), then base64url encode
    const compressed = pako.deflate(jsonStr);
    const b64 = btoa(String.fromCharCode(...compressed))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    const url = window.location.href.split('?')[0] + '?share=' + b64;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => showToast('🔗 链接已复制 ('+(b64.length)+'字符)'));
    } else {
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('🔗 链接已复制 ('+(b64.length)+'字符)');
    }
  } catch(e) { showToast('复制失败 ❌ ' + e.message); }
}

function loadSharedSession() {
  const params = new URLSearchParams(window.location.search);
  const share = params.get('share');
  if (!share) return;
  try {
    // Re-pad base64url and decode
    const b64 = share.replace(/-/g,'+').replace(/_/g,'/');
    const padded = b64 + '=='.slice(0, (4 - b64.length % 4) % 4);
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const jsonStr = pako.inflate(bytes, {to: 'string'});
    const payload = JSON.parse(jsonStr);
    window._sharedPayload = payload;
    renderSharedSessionView(payload);
  } catch(e) { console.error('Share decode error', e); }
}

function renderSharedSessionView(payload) {
  const {session: s, players} = payload;
  const pNameShared = pid => players.find(p=>p.id===pid)?.name || `P${pid}`;
  const date = new Date(s.startTime).toLocaleDateString('zh', {year:'numeric',month:'long',day:'numeric'});

  // Build level display for shared session

    const lk = s.playerLevels[p.id] || START_KEY;
    const cls = isBasement(lk)?'level-b':lk.startsWith('R1')?'level-r1':'level-r2';
    return `<div class="stat-row">
      <div style="flex:1;font-size:13px">${p.name}</div>
      <span class="level-badge ${cls}">${levelDisplay(lk)}</span>
    </div>`;
  }).join('');

  const roundList = s.rounds.map((r,i) => {
    const winner = getScoreWinner(r.score);
    const sc = winner==='dealer'?'var(--gold2)':'var(--green2)';
    const helpers = r.helperIds.map(h=>pNameShared(h)).join('、');
    return `<div class="round-item">
      <div class="round-header">
        <div class="round-num">#${i+1}</div>
        <div class="round-roles">庄:${pNameShared(r.dealerId)}${helpers?' 帮:'+helpers:''}</div>
        <div class="round-score" style="color:${sc}">${r.score}</div>
      </div>
    </div>`;
  }).join('');

  // Show in a full-page overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:500;overflow-y:auto;padding:16px';
  overlay.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="btn btn-secondary btn-sm" onclick="this.parentElement.parentElement.remove()">← 返回</button>
      <div style="font-family:Noto Serif SC;font-size:16px;color:var(--accent2)">分享的对局</div>
    </div>
    <div class="card"><div class="card-title">📅 ${date} · ${s.rounds.length}局</div>${levelRows}</div>
    <div class="card"><div class="card-title">对局记录</div>${roundList}</div>
    <button class="btn btn-primary btn-full" onclick="importSharedSession()">📥 导入到我的记录</button>
  `;
  document.body.appendChild(overlay);
}

// ══════ CAREER STATISTICS ══════
function renderCareer() {
  const el = document.getElementById('careerContent');
  const allSessions = state.currentSession
    ? [...state.sessions, state.currentSession]
    : state.sessions;
  const allRounds = [];
  allSessions.forEach(s => s.rounds.forEach(r => allRounds.push({...r, session:s})));

  if (!allRounds.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div><p>暂无生涯数据</p></div>';
    return;
  }

  const tabs = ['胜率统计','平均得分','成就榜'];
  const at = window._careerTab || 0;

  const pct=(w,t)=>t===0?'—':Math.round(w/t*100)+'%';
  const avg=(score,t)=>t===0?'—':Math.round(score/t)+'';

  // Compute career stats
  const cs = {};
  state.players.forEach(p => cs[p.id] = {
    dW:0,dT:0,dScore:0,
    hW:0,hT:0,hScore:0,
    fW:0,fT:0,fScore:0,
    sessions:0, rounds:0,
    achs:{}
  });

  allSessions.forEach(s => {
    s.players.forEach(pid => { if(cs[pid]) cs[pid].sessions++; });
  });

  allRounds.forEach(r => {
    const fIds = r.session.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p));
    const winner = getScoreWinner(r.score);
    const dW = winner==='dealer', fW = winner==='farmer';
    const ds = cs[r.dealerId];
    if(ds){ds.dT++;if(dW)ds.dW++;ds.dScore+=r.score;ds.rounds++;}
    r.helperIds.forEach(h=>{if(cs[h]){cs[h].hT++;if(dW)cs[h].hW++;cs[h].hScore+=r.score;cs[h].rounds++;}});
    fIds.forEach(f=>{if(cs[f]){cs[f].fT++;if(fW)cs[f].fW++;cs[f].fScore+=r.score;cs[f].rounds++;}});
    (r.achievements||[]).forEach(a=>{
      if(a.pid!=null&&cs[a.pid]){
        cs[a.pid].achs[a.name]=(cs[a.pid].achs[a.name]||0)+1;
      }
    });
  });

  let content = '';
  if (at === 0) {
    // Win rate table
    const makeTable = (label, wk, tk) => `
      <div class="card">
        <div class="card-title">${label}</div>
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:4px 12px;align-items:center">
          <div style="font-size:10px;color:var(--text3)">玩家</div>
          <div style="font-size:10px;color:var(--text3);text-align:right">胜率</div>
          <div style="font-size:10px;color:var(--text3);text-align:right">W/T</div>
          ${state.players.map(p=>`
          <div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-top:1px solid var(--border)">
            <div class="player-avatar" style="width:24px;height:24px;font-size:11px;flex-shrink:0">${pAvatar(p.id)}</div>
            <span style="font-size:13px">${p.name}</span>
          </div>
          <div style="font-family:'Playfair Display';font-size:15px;color:var(--accent2);text-align:right;border-top:1px solid var(--border);padding:6px 0">${pct(cs[p.id][wk],cs[p.id][tk])}</div>
          <div style="font-size:11px;color:var(--text3);text-align:right;border-top:1px solid var(--border);padding:6px 0">${cs[p.id][wk]}/${cs[p.id][tk]}</div>
          `).join('')}
        </div>
      </div>`;
    content = makeTable('生涯庄家胜率','dW','dT') + makeTable('生涯帮手胜率','hW','hT') + makeTable('生涯农民胜率','fW','fT');
    content += `<div class="card"><div class="card-title">参与局数</div>
      ${state.players.map(p=>`<div class="stat-row">
        <div style="display:flex;align-items:center;gap:8px;flex:1">
          <div class="player-avatar" style="width:24px;height:24px;font-size:11px">${pAvatar(p.id)}</div>
          <span style="font-size:13px">${p.name}</span>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-right:10px">${cs[p.id].sessions}场 · ${cs[p.id].rounds}局</div>
      </div>`).join('')}
    </div>`;
  } else if (at === 1) {
    const makeAvgTable = (label, sk, tk) => `
      <div class="card">
        <div class="card-title">${label}</div>
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:4px 12px;align-items:center">
          <div style="font-size:10px;color:var(--text3)">玩家</div>
          <div style="font-size:10px;color:var(--text3);text-align:right">均分</div>
          <div style="font-size:10px;color:var(--text3);text-align:right">局数</div>
          ${state.players.map(p=>`
          <div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-top:1px solid var(--border)">
            <div class="player-avatar" style="width:24px;height:24px;font-size:11px;flex-shrink:0">${pAvatar(p.id)}</div>
            <span style="font-size:13px">${p.name}</span>
          </div>
          <div style="font-family:'Playfair Display';font-size:15px;color:var(--gold2);text-align:right;border-top:1px solid var(--border);padding:6px 0">${avg(cs[p.id][sk],cs[p.id][tk])}</div>
          <div style="font-size:11px;color:var(--text3);text-align:right;border-top:1px solid var(--border);padding:6px 0">${cs[p.id][tk]}</div>
          `).join('')}
        </div>
      </div>`;
    content = makeAvgTable('生涯庄家均分','dScore','dT') + makeAvgTable('生涯帮手均分','hScore','hT') + makeAvgTable('生涯农民均分','fScore','fT');
  } else {
    // Career achievements
    content = state.players.map(p => {
      const entries = Object.entries(cs[p.id].achs).sort((a,b)=>b[1]-a[1]);
      if (!entries.length) return '';
      return `<div class="card">
        <div class="card-title">
          <div class="player-avatar" style="width:24px;height:24px;font-size:11px;margin-right:4px">${pAvatar(p.id)}</div>
          ${p.name}
        </div>
        ${entries.map(([name,cnt])=>`<div class="stat-row">
          <div style="flex:1;font-size:13px">${name}</div>
          <div style="font-family:'Playfair Display';font-size:16px;color:var(--accent2)">${cnt}</div>
        </div>`).join('')}
      </div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="inner-tabs">
      ${tabs.map((t,i)=>`<button class="inner-tab ${i===at?'active':''}" onclick="window._careerTab=${i};renderCareer()">${t}</button>`).join('')}
    </div>
    ${content}`;
}




// ══════════════════════════════════════════════════
// REAL-TIME SYNC via JSONBin.io
// ══════════════════════════════════════════════════
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';
// Poll interval now defined in startPolling (30s, guests only)
let _pollTimer = null;
let _isSyncing = false;
let _lastRoundCount = 0;

function makRoomCode(binId) {
  return binId.slice(-6).toUpperCase();
}

function renderRoomBar() {
  const r = state.room;
  if (!r) {
    return '<div class="room-bar"><div style="flex:1;font-size:12px;color:var(--text3)">未连接同步房间</div>' +
      '<button class="btn btn-sm btn-secondary" onclick="goToSettings()">设置同步</button></div>';
  }
  const roleLabel = r.isHost ? '🏠 房主' : '👥 观看';
  const statusDot = _isSyncing ? '<span class="sync-dot"></span>同步中' : '● 已连接';
  const refreshBtn = r.isHost ? '' :
    '<button class="btn btn-sm btn-secondary" style="margin-right:6px" onclick="manualRefresh()">↻ 刷新</button>';
  return '<div class="room-bar">' +
    '<div style="flex:1"><div class="room-code">' + r.code + '</div>' +
    '<div style="font-size:10px;color:var(--text3)">' + roleLabel + ' · <span class="room-status live">' + statusDot + '</span> · 30s自动刷新</div></div>' +
    refreshBtn +
    '<button class="btn btn-sm btn-danger" onclick="leaveRoom()">离开</button></div>';
}

function renderRoomInfo() {
  const r = state.room;
  if (!r) return '';
  if (r.isHost) {
    return '<div class="card" style="margin-top:8px"><div class="card-title">当前房间</div>' +
      '<div style="font-size:12px;color:var(--text2);margin-bottom:6px">把 Bin ID 分享给朋友：</div>' +
      '<div style="font-family:monospace;font-size:12px;background:var(--bg4);padding:8px 10px;border-radius:8px;word-break:break-all;color:var(--accent2)">' + r.binId + '</div>' +
      '<button class="btn btn-sm btn-secondary btn-full" style="margin-top:8px" onclick="copyBinId()">📋 复制 Bin ID</button>' +
      '<button class="btn btn-sm btn-danger btn-full" style="margin-top:6px" onclick="leaveRoom()">离开房间</button></div>';
  }
  return '<div class="card" style="margin-top:8px"><div class="card-title">当前房间</div>' +
    '<div style="font-size:12px;color:var(--text2)">已加入 <b style="color:var(--accent2)">' + r.code + '</b>，每10秒自动同步</div>' +
    '<button class="btn btn-sm btn-danger btn-full" style="margin-top:8px" onclick="leaveRoom()">离开房间</button></div>';
}

async function createRoom() {
  const apiKey = state.jsonbinApiKey;
  if (!apiKey) { showToast('请先填写 API Key ❌'); return; }
  if (!state.currentSession) { showToast('请先创建游戏局 ❌'); return; }
  showToast('正在创建房间…');
  try {
    const payload = buildSyncPayload();
    const res = await fetch(JSONBIN_BASE + '/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': apiKey,
        'X-Bin-Name': 'shengji-' + Date.now(),
        'X-Bin-Private': 'false',
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const binId = data.metadata.id;
    const code = makRoomCode(binId);
    state.room = { binId, code, isHost: true, lastPushed: Date.now() };
    saveState();
    startPolling();
    renderHome();
    renderSettings();
    showRoomCreatedModal(code, binId);
  } catch(e) {
    showToast('创建失败: ' + e.message + ' ❌');
  }
}

function showRoomCreatedModal(code, binId) {
  document.getElementById('roomModalContent').innerHTML =
    '<div style="text-align:center;padding:16px 0">' +
    '<div style="font-size:13px;color:var(--text2);margin-bottom:8px">房间已创建！把以下 Bin ID 发给朋友：</div>' +
    '<div style="font-family:monospace;font-size:12px;background:var(--bg4);padding:10px;border-radius:8px;word-break:break-all;color:var(--accent2);margin:12px 0">' + binId + '</div>' +
    '<button class="btn btn-secondary btn-full" style="margin-bottom:8px" onclick="copyBinId()">📋 复制 Bin ID</button>' +
    '<button class="btn btn-primary btn-full" onclick="closeModal(&apos;modalRoom&apos;)">好的！</button></div>';
  openModal('modalRoom');
}

function openJoinRoom() {
  document.getElementById('roomModalContent').innerHTML =
    '<div style="margin-bottom:12px;font-size:13px;color:var(--text2)">向房主索要 Bin ID，粘贴到下方：</div>' +
    '<div class="input-group"><label class="input-label">Bin ID</label>' +
    '<input id="joinBinIdInput" type="text" placeholder="6408b35c3cd6571f853f6b1f" style="font-size:13px"></div>' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn btn-secondary flex-1" onclick="closeModal(&apos;modalRoom&apos;)">取消</button>' +
    '<button class="btn btn-primary flex-1" onclick="joinRoomById()">加入</button></div>';
  openModal('modalRoom');
}

async function joinRoomById() {
  const el = document.getElementById('joinBinIdInput');
  const binId = el ? el.value.trim() : '';
  if (!binId) { showToast('请输入 Bin ID ❌'); return; }
  showToast('正在连接…');
  try {
    // Reading a public bin requires no API key
    const res = await fetch(JSONBIN_BASE + '/b/' + binId + '/latest', {
      headers: { 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    applyRemotePayload(data.record);
    const code = makRoomCode(binId);
    state.room = { binId, code, isHost: false, lastPushed: 0 };
    saveState();
    startPolling();
    closeModal('modalRoom');
    renderAll();
    showToast('已加入房间 ' + code + ' ✅');
  } catch(e) {
    showToast('加入失败: ' + e.message + ' ❌');
  }
}

function buildSyncPayload() {
  return {
    updatedAt: Date.now(),
    session: state.currentSession,
    players: state.players.map(function(p) { return {id:p.id, name:p.name, seat:p.seat}; }),
  };
}

function applyRemotePayload(remote) {
  if (!remote) return;
  if (remote.session) state.currentSession = remote.session;
  if (remote.players) {
    remote.players.forEach(function(rp) {
      const lp = state.players.find(function(p) { return p.id === rp.id; });
      if (lp) { lp.name = rp.name; lp.seat = rp.seat; }
    });
  }
  saveState();
}

async function pushToRoom() {
  const r = state.room;
  if (!r || !r.isHost || !state.jsonbinApiKey) return;
  _isSyncing = true;
  try {
    const res = await fetch(JSONBIN_BASE + '/b/' + r.binId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': state.jsonbinApiKey },
      body: JSON.stringify(buildSyncPayload())
    });
    if (res.ok) { r.lastPushed = Date.now(); saveState(); }
  } catch(e) { console.error('push error', e); }
  _isSyncing = false;
}

async function pullFromRoom() {
  const r = state.room;
  if (!r) return;
  // Public bins are readable without API key — guests don't consume host's quota
  try {
    const res = await fetch(JSONBIN_BASE + '/b/' + r.binId + '/latest', {
      headers: { 'X-Bin-Meta': 'false' }  // skip metadata to reduce response size
    });
    if (!res.ok) return;
    const data = await res.json();
    const remote = data.record;
    if (remote && remote.updatedAt && remote.updatedAt !== (state._lastRemoteUpdate||0)) {
      state._lastRemoteUpdate = remote.updatedAt;
      if (!r.isHost) {
        applyRemotePayload(remote);
        renderHome();
        renderStats();
      }
    }
  } catch(e) { console.error('pull error', e); }
}

// Adaptive polling: 30s normally, pause when hidden, guests only
const POLL_INTERVAL_ACTIVE = 30000;  // 30s when visible
let _appVisible = true;

function startPolling() {
  stopPolling();
  // Guests poll; host only pushes (no need to pull own data)
  if (state.room && !state.room.isHost) {
    pullFromRoom(); // immediate pull on join
    _pollTimer = setInterval(function() {
      if (_appVisible && state.room && !state.room.isHost) pullFromRoom();
    }, POLL_INTERVAL_ACTIVE);
  }
}

function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// Pause/resume polling based on page visibility (screen off, app switch etc.)
document.addEventListener('visibilitychange', function() {
  _appVisible = !document.hidden;
  if (_appVisible && state.room && !state.room.isHost) {
    // Pull immediately when app comes back to foreground
    pullFromRoom();
  }
});

function manualRefresh() {
  pullFromRoom().then(function() { renderHome(); showToast('已刷新 ✅'); });
}

function leaveRoom() {
  if (!confirm('确定离开同步房间？')) return;
  stopPolling();
  state.room = null;
  saveState();
  renderHome();
  renderSettings();
  showToast('已离开房间');
}

function copyBinId() {
  const r = state.room;
  if (!r) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(r.binId).then(function() { showToast('已复制 Bin ID 📋'); });
  } else {
    const ta = document.createElement('textarea');
    ta.value = r.binId; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('已复制 Bin ID 📋');
  }
}

function resumeRoomSync() {
  if (state.room) {
    _lastRoundCount = state.currentSession ? state.currentSession.rounds.length : 0;
    startPolling();
  }
}

// Auto-push after new round saved
const _origSaveState = saveState;
function saveState() {
  try { localStorage.setItem('sj_v3', JSON.stringify(state)); } catch(e) {}
  const newCount = state.currentSession ? state.currentSession.rounds.length : 0;
  if (newCount > _lastRoundCount) {
    _lastRoundCount = newCount;
    if (state.room && state.room.isHost) setTimeout(pushToRoom, 300);
  }
}

</script>
