<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>升级 · 记分册</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--bg4:#242430;--border:#2e2e3a;--border2:#3a3a4a;--text:#e8e4dc;--text2:#9990a0;--text3:#5a5468;--accent:#c8954a;--accent2:#e8b86d;--red:#d95f5f;--red2:#f07878;--green:#5aaa7a;--green2:#7acc96;--gold:#d4af6a;--gold2:#f0cc88;--purple:#8b6aaa;--radius:12px;--radius2:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans SC",sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 20% 20%,rgba(200,149,74,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(139,106,170,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.nav{position:sticky;top:0;z-index:100;background:rgba(13,13,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px}
.nav-title{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700;color:var(--accent2);letter-spacing:.1em;flex:1}
.nav-title span{color:var(--text3);font-size:11px;font-weight:400;margin-left:6px;font-family:"Noto Sans SC";letter-spacing:0}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:6px 12px;border-radius:var(--radius2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;transition:all .2s}
.nav-tab.active{background:var(--bg3);color:var(--accent2)}
.page{display:none;padding:16px;position:relative;z-index:1}
.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-family:"Noto Serif SC",serif;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:var(--radius2);font-family:"Noto Sans SC";font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;gap:6px}
.btn-primary{background:var(--accent);color:#0d0d0f}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(217,95,95,.15);color:var(--red2);border:1px solid rgba(217,95,95,.3)}
.btn-sm{padding:6px 12px;font-size:12px}.btn-full{width:100%}.btn:disabled{opacity:.4;cursor:not-allowed}
.input-group{margin-bottom:14px}
.input-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);color:var(--text);font-family:"Noto Sans SC";font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg3)}
.score-display{font-family:"Playfair Display",serif;font-size:56px;font-weight:700;text-align:center;line-height:1;margin:8px 0 4px;transition:color .3s}
.score-label{text-align:center;font-size:12px;color:var(--text2);margin-bottom:16px;height:18px}
.slider-wrap{padding:0 4px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;padding:0;background:var(--bg4);border-radius:3px;border:none;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(200,149,74,.2)}
.score-ticks{display:flex;justify-content:space-between;padding:4px 2px 0;font-size:10px;color:var(--text3)}
.players-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.player-chip{background:var(--bg3);border:2px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative;user-select:none}
.player-chip.dealer{border-color:var(--gold);background:rgba(212,175,106,.08)}
.player-chip.helper{border-color:var(--purple);background:rgba(139,106,170,.08)}
.player-chip.farmer{border-color:var(--green);background:rgba(90,170,122,.08)}
.player-chip .chip-name{font-size:12px;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-chip .chip-level{font-size:10px;color:var(--text3)}
.player-chip .chip-role{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:9px;padding:2px 6px;border-radius:10px;white-space:nowrap}
.player-chip.dealer .chip-role{background:var(--gold);color:#0d0d0f}
.player-chip.helper .chip-role{background:var(--purple);color:#fff}

.player-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.player-avatar img{width:100%;height:100%;object-fit:cover}
.red-five-row{display:flex;gap:10px;margin-bottom:8px}
.red-five-card{flex:1;border:2px solid var(--border);background:var(--bg3);border-radius:var(--radius2);padding:10px;text-align:center}
.red-five-card.active-heart{border-color:var(--red);background:rgba(217,95,95,.1)}
.red-five-card.active-diamond{border-color:var(--accent);background:rgba(200,149,74,.08)}
.red-five-suit{font-size:22px;display:block;line-height:1.2}
.red-five-label{font-size:10px;color:var(--text2);margin:2px 0 6px}
.red-five-counter{display:flex;align-items:center;justify-content:center;gap:8px}
.rf-count{font-family:"Playfair Display";font-size:18px;min-width:20px}
.who-prompt{background:var(--bg4);border-radius:var(--radius2);padding:10px 12px;margin-top:8px;font-size:12px;color:var(--text2)}
.who-prompt strong{color:var(--text);display:block;margin-bottom:6px}
.who-captor-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.who-captor-label{font-size:12px;color:var(--text2);min-width:28px}
.mini-player-row{display:flex;gap:6px;flex-wrap:wrap}
.mini-player-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);font-size:12px;cursor:pointer;transition:all .2s;color:var(--text2)}
.mini-player-btn.sel-heart{border-color:var(--red);background:rgba(217,95,95,.1);color:var(--red2)}
.mini-player-btn.sel-diamond{border-color:var(--accent);background:rgba(200,149,74,.1);color:var(--accent2)}
.penalty-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--radius2);padding:8px 12px;margin-bottom:8px}
.penalty-player{flex:1;font-size:13px}
.penalty-count{font-family:"Playfair Display";font-size:18px;color:var(--red2);min-width:28px;text-align:center}
.counter-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--bg4);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.counter-btn:hover{border-color:var(--accent);color:var(--accent)}
.level-badge{display:inline-flex;align-items:center;justify-content:center;min-width:40px;height:22px;border-radius:11px;font-size:11px;font-weight:600;padding:0 8px;font-family:"Noto Serif SC"}
.level-r1{background:rgba(90,170,122,.15);color:var(--green2);border:1px solid rgba(90,170,122,.3)}
.level-r2{background:rgba(200,149,74,.15);color:var(--gold2);border:1px solid rgba(200,149,74,.3)}
.level-b{background:rgba(217,95,95,.15);color:var(--red2);border:1px solid rgba(217,95,95,.3)}
.round-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.round-item:hover{border-color:var(--border2)}
.round-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.round-num{font-family:"Playfair Display";font-size:13px;color:var(--text3);min-width:28px}
.round-roles{flex:1;font-size:12px;color:var(--text2)}
.round-score{font-family:"Playfair Display";font-size:20px;font-weight:700}
.round-achievements{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ach-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.ach-tag.gold{background:rgba(212,175,106,.12);border-color:rgba(212,175,106,.3);color:var(--gold2)}
.ach-tag.red{background:rgba(217,95,95,.12);border-color:rgba(217,95,95,.3);color:var(--red2)}
.ach-tag.green{background:rgba(90,170,122,.12);border-color:rgba(90,170,122,.3);color:var(--green2)}
.ach-tag.purple{background:rgba(139,106,170,.12);border-color:rgba(139,106,170,.3);color:#b898dd}
.stat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.modal-title{font-family:"Noto Serif SC";font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent2)}
.setup-hero{text-align:center;padding:32px 0 24px}
.setup-hero h1{font-family:"Noto Serif SC";font-size:32px;color:var(--accent2);letter-spacing:.1em;margin-bottom:6px}
.setup-hero p{color:var(--text2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.inner-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius2);padding:3px;margin-bottom:14px}
.inner-tab{flex:1;padding:7px;border-radius:6px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:none}
.inner-tab.active{background:var(--bg);color:var(--text)}
/* Seat drag */
.seat-list{display:flex;flex-direction:column;gap:8px}
.seat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius2);border:1px solid var(--border);transition:background .2s}
.seat-num{font-size:11px;color:var(--text3);min-width:36px}
.seat-move-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.seat-move-btn{width:26px;height:22px;border-radius:5px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.seat-move-btn:hover{border-color:var(--accent);color:var(--accent)}
.seat-move-btn:disabled{opacity:.2;cursor:not-allowed}
.seat-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.seat-avatar img{width:100%;height:100%;object-fit:cover}
.seat-name{flex:1;font-size:13px}
.avatar-upload-wrap{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;font-size:18px}
.avatar-upload-wrap img{width:100%;height:100%;object-fit:cover}
.level-chart{overflow-x:auto;padding-bottom:8px}
.result-banner{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;text-align:center}
.result-banner.dealer-win{background:linear-gradient(135deg,rgba(212,175,106,.15),rgba(212,175,106,.05));border:1px solid rgba(212,175,106,.3)}
.result-banner.farmer-win{background:linear-gradient(135deg,rgba(90,170,122,.15),rgba(90,170,122,.05));border:1px solid rgba(90,170,122,.3)}
.result-banner.no-change{background:var(--bg3);border:1px solid var(--border)}
.result-title{font-family:"Noto Serif SC";font-size:16px;font-weight:700;margin-bottom:4px}
.result-detail{font-size:12px;color:var(--text2)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.radio-btn{padding:7px 14px;border-radius:var(--radius2);border:1px solid var(--border2);background:var(--bg3);font-size:12px;cursor:pointer;transition:all .2s;color:var(--text2)}
.radio-btn.selected{border-color:var(--accent);background:rgba(200,149,74,.1);color:var(--accent2)}
.flex-row{display:flex;gap:8px}.flex-1{flex:1}
.section-label{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;margin-top:4px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>

<body>
<nav class="nav">
  <div class="nav-title">升级<span id="sessionIndicator"></span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home',this)">主页</button>
    <button class="nav-tab" onclick="showPage('round',this)">记分</button>
    <button class="nav-tab" onclick="showPage('stats',this)">统计</button>
    <button class="nav-tab" onclick="showPage('settings',this)">设置</button>
  </div>
</nav>
<div class="toast" id="toast"></div>
<div class="page active" id="page-home"><div id="homeContent"></div></div>
<div class="page" id="page-round"><div id="roundContent"></div></div>
<div class="page" id="page-stats"><div id="statsContent"></div></div>
<div class="page" id="page-settings"><div id="settingsContent"></div></div>

<div class="modal-overlay" id="modalSessionSetup">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🀄 新局设置</div>
    <div class="input-group">
      <label class="input-label">终局条件：任意玩家到达此级别时，本局结束</label>
      <div class="flex-row">
        <div class="flex-1"><select id="setupEndLevel">
          <option value="2">2</option><option value="4">4</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
          <option value="10">10</option><option value="J">J</option><option value="Q">Q</option>
          <option value="K">K</option><option value="A" selected>A</option>
        </select></div>
        <div class="flex-1"><select id="setupEndRound">
          <option value="R1" selected>第一轮</option>
          <option value="R2">第二轮</option><option value="R3">第三轮</option>
          <option value="R4">第四轮</option><option value="R5">第五轮</option>
        </select></div>
      </div>
    </div>
    <div class="input-group">
      <label class="input-label">起始庄家</label>
      <div class="radio-group" id="setupFirstDealer"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="startSession()">开始本局</button>
  </div>
</div>

<div class="modal-overlay" id="modalRoundDetail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="roundDetailContent"></div>
    <button class="btn btn-secondary btn-full" onclick="closeModal('modalRoundDetail')">关闭</button>
  </div>
</div>

<script>
// ══════ LEVEL SYSTEM ══════
// Flat linear sequence. B3:2 < B2:2 < B1:2 < R1:2 < R1:4 < ... < R1:A < R2:2 < ...
// A "key" is a string like "R1:A" or "B2:2"
// We build a flat ordered array and index into it.

const LEVEL_NAMES = ['2','4','6','7','8','9','10','J','Q','K','A']; // 11 levels
const REGULAR_ROUNDS = ['R1','R2','R3','R4','R5'];
const BASEMENT_ROUNDS = ['B1','B2','B3','B4','B5','B6','B7','B8','B9','B10']; // B1 closest to surface

// Build flat sequence
function buildSequence() {
  const seq = [];
  // Basement: deepest first so index increases going up
  // B5:2, B4:2, B3:2, B2:2, B1:2, R1:2, R1:4, ... R1:A, R2:2, ...
  for (let i = BASEMENT_ROUNDS.length - 1; i >= 0; i--) {
    seq.push(BASEMENT_ROUNDS[i] + ':2');
  }
  for (const r of REGULAR_ROUNDS) {
    for (const l of LEVEL_NAMES) {
      seq.push(r + ':' + l);
    }
  }
  return seq;
}
const LEVEL_SEQ = buildSequence();
// LEVEL_SEQ[0] = B5:2 (deepest basement)
// LEVEL_SEQ[4] = B1:2 (shallowest basement)
// LEVEL_SEQ[5] = R1:2 (start)
// LEVEL_SEQ[15] = R1:A
// LEVEL_SEQ[16] = R2:2

const START_KEY = 'R1:2';

function keyIndex(key) { return LEVEL_SEQ.indexOf(key); }

function stepLevel(key, steps) {
  let idx = keyIndex(key);
  if (idx === -1) idx = keyIndex(START_KEY);
  idx = Math.max(0, Math.min(LEVEL_SEQ.length - 1, idx + steps));
  return LEVEL_SEQ[idx];
}

function levelDisplay(key) {
  if (!key) return '?';
  const col = key.indexOf(':');
  const round = key.slice(0, col);
  const level = key.slice(col + 1);
  if (round === 'R1') return level;
  if (round.startsWith('R')) return `${level}(第${round.slice(1)}轮)`;
  // Basement: B1 = 地下1, B2 = 地下2, etc.
  return `${level}(地下${round.slice(1)})`;
}

function isBasement(key) {
  return key && key.startsWith('B');
}

// ══════ STATE ══════

function saveState() { try { localStorage.setItem('sj_v3', JSON.stringify(state)); } catch(e){} }
function loadState() {
  try {
    const raw = localStorage.getItem('sj_v3');
    if (raw) {
      const loaded = JSON.parse(raw);
      // Keep embedded avatars and names as defaults
      const defaults = getDefaultPlayers();
      loaded.players = loaded.players.map((p, i) => ({
        ...p,
        avatar: p.avatar || (defaults[i] && defaults[i].avatar) || null,
        name: p.name || (defaults[i] && defaults[i].name) || `P${i+1}`,
      }));
      state = loaded;
    }
  } catch(e) {}
}

function getDefaultPlayers() {
  return state.players; // already set from embedded data
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `shengji_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url); showToast('已导出存档 📁');
}
function importData(file) {
  const r = new FileReader();
  r.onload = e => { try { state=JSON.parse(e.target.result); saveState(); renderAll(); showToast('已导入 ✅'); } catch(e){ showToast('格式错误 ❌'); } };
  r.readAsText(file);
}

// ══════ SCORE LOGIC ══════
function getScoreResult(score) {
  if (score === 0)  return {side:'dealer', levels:3};
  if (score <= 55)  return {side:'dealer', levels:2};
  if (score <= 115) return {side:'dealer', levels:1};
  if (score <= 175) return {side:'none',   levels:0};
  if (score <= 235) return {side:'farmer', levels:1};
  if (score <= 295) return {side:'farmer', levels:2};
  return                   {side:'farmer', levels:3};
}
function getScoreLabel(s) {
  if (s===0) return '大光头 💀';
  if (s<=59) return '小光头 😬';
  if (s<=115) return '庄家胜';
  if (s<=175) return '平局';
  if (s<=239) return '小跳 🎉';
  if (s<=299) return '大跳 🚀';
  return '超级跳 🌟';
}
function getScoreColor(s) {
  if (s<=115) return 'var(--gold2)';
  if (s<=175) return 'var(--text2)';
  return 'var(--green2)';
}

function computeLevelChanges(round, session) {
  const {dealerId, helperIds, score, heartFiveCaptors, diamondFiveCaptors, penalties} = round;
  const dealerSide = [dealerId, ...helperIds];
  const farmerIds = session.players.filter(p => p !== dealerId && !helperIds.includes(p));
  const result = getScoreResult(score);
  const changes = {}; session.players.forEach(p => changes[p] = 0);

  if (result.side === 'dealer') dealerSide.forEach(p => changes[p] += result.levels);
  else if (result.side === 'farmer') farmerIds.forEach(p => changes[p] += result.levels);

  const hCount = (heartFiveCaptors||[]).length;
  const dCount = (diamondFiveCaptors||[]).length;
  if (hCount > 0) dealerSide.forEach(p => changes[p] -= 2 * hCount);
  if (dCount > 0) dealerSide.forEach(p => changes[p] -= 1 * dCount);

  Object.entries(penalties||{}).forEach(([pid, cnt]) => { changes[parseInt(pid)] -= cnt; });
  return changes;
}

function applyLevelChanges(session, changes) {
  const nL = {...session.playerLevels};
  Object.entries(changes).forEach(([pid, delta]) => {
    nL[parseInt(pid)] = stepLevel(nL[parseInt(pid)] || START_KEY, delta);
  });
  return nL;
}

// ══════ ACHIEVEMENTS ══════
function computeAchievements(round, session, levelsBefore, levelsAfter) {
  const {dealerId, helperIds, score, heartFiveCaptors, diamondFiveCaptors, penalties} = round;
  const result = getScoreResult(score);
  const dealerSide = [dealerId, ...helperIds];
  const farmerIds = session.players.filter(p => p !== dealerId && !helperIds.includes(p));
  const achs = [];
  const ach = (name, color, pid=null) => achs.push({name, color, pid});

  // Fix 1: Score achievements assigned to winning side players
  if (score === 0) {
    dealerSide.forEach(pid => ach('大光头', 'red', pid));
  } else if (score <= 59) {
    dealerSide.forEach(pid => ach('小光头', 'red', pid));
  }
  if (score >= 300) {
    farmerIds.forEach(pid => ach('超级跳', 'green', pid));
  } else if (score >= 240) {
    farmerIds.forEach(pid => ach('大跳', 'green', pid));
  } else if (score >= 180) {
    farmerIds.forEach(pid => ach('小跳', 'green', pid));
  }

  // Red five captures — credited to captor
  (heartFiveCaptors||[]).forEach(pid => ach('抓住红五♥', 'red', pid));
  (diamondFiveCaptors||[]).forEach(pid => ach('抓住方五♦', 'gold', pid));

  // 坏了坏了: dealer side lost AND red five captured — assigned to all dealer side
  const rfCaptured = (heartFiveCaptors||[]).length + (diamondFiveCaptors||[]).length > 0;
  if (rfCaptured && result.side !== 'dealer') {
    dealerSide.forEach(pid => ach('坏了坏了', 'red', pid));
  }

  // Team composition
  if (helperIds.length === 0) {
    ach('How dare you?', 'purple', dealerId);
    if (result.side === 'dealer') ach('Lone Wolf', 'gold', dealerId);
  } else if (helperIds.length === 1) {
    ach('浪漫双人车驾驶员', 'purple', dealerId);
    ach('浪漫双人车乘客', 'purple', helperIds[0]);
  }

  // Fix 2: 虚惊一场 — got penalty but did NOT level down (includes no change AND level up)
  Object.entries(penalties||{}).forEach(([pidStr, cnt]) => {
    const pid = parseInt(pidStr);
    if (cnt >= 2) ach('手残党', 'red', pid);
    if (cnt > 0 && keyIndex(levelsAfter[pid]) >= keyIndex(levelsBefore[pid])) ach('虚惊一场', 'purple', pid);
  });

  // Dealer streak
  if (result.side === 'dealer') {
    let streak = 1;
    for (let i = session.rounds.length - 1; i >= 0; i--) {
      if (session.rounds[i].dealerId === dealerId) streak++;
      else break;
    }
    if (streak >= 9) ach('我要验牌', 'gold', dealerId);
    else if (streak >= 7) ach('一个人玩儿得了', 'gold', dealerId);
    else if (streak >= 5) ach('不倒翁', 'gold', dealerId);
    else if (streak >= 3) ach('房东收租', 'gold', dealerId);
  }

  // Redemption arc
  session.players.forEach(pid => {
    const before = levelsBefore[pid]||'';
    const after = levelsAfter[pid]||'';
    if (isBasement(before) && !isBasement(after)) ach('Redemption Arc', 'green', pid);
  });

  return achs;
}

function computeSessionAchievements(session) {
  const achs = [];
  const c = {}; session.players.forEach(p => c[p]={d:0,h:0,f:0});
  session.rounds.forEach(r => {
    c[r.dealerId].d++;
    r.helperIds.forEach(h => c[h].h++);
    session.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p)).forEach(f=>c[f].f++);
  });
  const maxD=Math.max(...Object.values(c).map(x=>x.d));
  const maxH=Math.max(...Object.values(c).map(x=>x.h));
  const maxF=Math.max(...Object.values(c).map(x=>x.f));
  if(maxD>0) Object.entries(c).filter(([,v])=>v.d===maxD).forEach(([p])=>achs.push({pid:parseInt(p),name:'大地主',color:'gold'}));
  if(maxH>0) Object.entries(c).filter(([,v])=>v.h===maxH).forEach(([p])=>achs.push({pid:parseInt(p),name:'好帮手',color:'purple'}));
  if(maxF>0) Object.entries(c).filter(([,v])=>v.f===maxF).forEach(([p])=>achs.push({pid:parseInt(p),name:'老农民',color:'green'}));
  session.players.forEach(p => {
    let stayed=false;
    for(let i=1;i<session.rounds.length;i++){if(session.rounds[i].dealerId===p&&session.rounds[i-1].dealerId===p){stayed=true;break;}}
    if(!stayed&&c[p].d>0) achs.push({pid:p,name:'过客',color:'purple'});
  });
  return achs;
}

function renderRoundItem(r, num, session) {
  const result = getScoreResult(r.score);
  const sc = result.side==='dealer'?'var(--gold2)':result.side==='farmer'?'var(--green2)':'var(--text2)';
  const helpers = r.helperIds.map(h=>pName(h)).join('、');
  const achTags = (r.achievements||[]).map(a=>`<span class="ach-tag ${a.color}">${a.pid!=null?pName(a.pid)+'·':''}${a.name}</span>`).join('');
  return `<div class="round-item" onclick="showRoundDetail(${r.id})">
    <div class="round-header">
      <div class="round-num">#${num}</div>
      <div class="round-roles">庄:${pName(r.dealerId)}${helpers?' 帮:'+helpers:''}</div>
      <div class="round-score" style="color:${sc}">${r.score}</div>
    </div>
    ${achTags?`<div class="round-achievements">${achTags}</div>`:''}
  </div>`;
}

// ── ROUND FORM ──
function renderRound() {
  const el = document.getElementById('roundContent');
  const s = state.currentSession;
  if (!s) { el.innerHTML='<div class="empty"><div class="empty-icon">🎴</div><p>请先在主页创建新局</p></div>'; return; }

  const farmerIds = s.players.filter(p => p !== roundForm.dealerId && !roundForm.helperIds.includes(p));

  const playersHtml = state.players.map(p => {
    let role='', cls='';
    if(roundForm.dealerId===p.id){role='庄家';cls='dealer';}
    else if(roundForm.helperIds.includes(p.id)){role='帮手';cls='helper';}
    else if(roundForm.dealerId!==null){role='农民';cls='farmer';}
    return `<div class="player-chip ${cls}" onclick="cycleRole(${p.id})">
      ${role?`<div class="chip-role">${role}`:''}</div>
      <div class="player-avatar">${pAvatar(p.id)}</div>
      <div class="chip-name">${p.name}</div>
      <div class="chip-level">${levelDisplay(s.playerLevels[p.id]||START_KEY)}</div>
    </div>`;
  }).join('');

  const buildCaptorRows = (type, captors) => {
    if (!captors.length) return '';
    const selClass = type==='heart'?'sel-heart':'sel-diamond';
    return captors.map((sel, i) => {
      const btns = farmerIds.map(fid =>
        `<button class="mini-player-btn ${sel===fid?selClass:''}" onclick="setCaptor('${type}',${i},${fid})">${pName(fid)}</button>`
      ).join('');
      return `<div class="who-captor-row"><span class="who-captor-label">第${i+1}张</span><div class="mini-player-row">${btns}</div></div>`;
    }).join('');
  };

  const hc = roundForm.heartFiveCaptors.length, dc = roundForm.diamondFiveCaptors.length;
  const heartWho = hc>0?`<div class="who-prompt"><strong>♥5 被谁抓住？（共${hc}张）</strong>${buildCaptorRows('heart',roundForm.heartFiveCaptors)}</div>`:'';
  const diamondWho = dc>0?`<div class="who-prompt"><strong>♦5 被谁抓住？（共${dc}张）</strong>${buildCaptorRows('diamond',roundForm.diamondFiveCaptors)}</div>`:'';

  const penHtml = state.players.map(p => {
    const cnt = roundForm.penalties[p.id]||0;
    return `<div class="penalty-row">
      <div class="penalty-player">${p.name}</div>
      <button class="counter-btn" onclick="changePenalty(${p.id},-1)">−</button>
      <div class="penalty-count">${cnt>0?cnt:'—'}</div>
      <button class="counter-btn" onclick="changePenalty(${p.id},1)">+</button>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">第 ${s.rounds.length+1} 局 · 分配角色</div>
      <div class="section-label">点击：空→庄家→帮手(最多2)→清除</div>
      <div class="players-grid">${playersHtml}</div>
    </div>
    <div class="card">
      <div class="card-title">农民得分</div>
      <div class="score-display" style="color:${getScoreColor(roundForm.score)}" id="scoreDisp">${roundForm.score}</div>
      <div class="score-label" id="scoreLabel">${getScoreLabel(roundForm.score)}</div>
      <div class="slider-wrap">
        <input type="range" min="0" max="300" step="5" value="${roundForm.score}" oninput="updateScore(this.value)">
        <div class="score-ticks"><span>0</span><span>60</span><span>120</span><span>180</span><span>240</span><span>300</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">红五 / 方五</div>
      <div class="red-five-row">
        <div class="red-five-card ${hc>0?'active-heart':''}">
          <span class="red-five-suit" style="color:${hc>0?'var(--red2)':'var(--text3)'}">♥</span>
          <div class="red-five-label">红五 (庄-2级/张)</div>
          <div class="red-five-counter">
            <button class="counter-btn" onclick="changeRedFive('heart',-1)">−</button>
            <span class="rf-count" style="color:${hc>0?'var(--red2)':'var(--text3)'}">${hc}</span>
            <button class="counter-btn" onclick="changeRedFive('heart',1)">+</button>
          </div>
        </div>
        <div class="red-five-card ${dc>0?'active-diamond':''}">
          <span class="red-five-suit" style="color:${dc>0?'var(--accent2)':'var(--text3)'}">♦</span>
          <div class="red-five-label">方五 (庄-1级/张)</div>
          <div class="red-five-counter">
            <button class="counter-btn" onclick="changeRedFive('diamond',-1)">−</button>
            <span class="rf-count" style="color:${dc>0?'var(--accent2)':'var(--text3)'}">${dc}</span>
            <button class="counter-btn" onclick="changeRedFive('diamond',1)">+</button>
          </div>
        </div>
      </div>
      ${heartWho}${diamondWho}
    </div>
    <div class="card"><div class="card-title">出牌错误罚级</div>${penHtml}</div>
    <button class="btn btn-primary btn-full" onclick="submitRound()" style="margin-bottom:24px">✓ 确认记录本局</button>`;
}

// ── STATS ──
function renderStats() {
  const el = document.getElementById('statsContent');
  const sessions = state.currentSession ? [...state.sessions, state.currentSession] : state.sessions;
  const allRounds = []; sessions.forEach(s => s.rounds.forEach(r => allRounds.push({...r, session:s})));
  if (!allRounds.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><p>暂无数据</p></div>'; return; }
  const tabs=['角色胜率','级别走势','成就榜'];
  const at = window._statsTab||0;
  const content = at===0?renderWinRates(allRounds):at===1?renderLevelChart():renderAchStats(allRounds);
  el.innerHTML=`<div class="inner-tabs">${tabs.map((t,i)=>`<button class="inner-tab ${i===at?'active':''}" onclick="window._statsTab=${i};renderStats()">${t}</button>`).join('')}</div>${content}`;
}

function renderWinRates(allRounds) {
  const s={}; state.players.forEach(p=>s[p.id]={dW:0,dT:0,hW:0,hT:0,fW:0,fT:0});
  allRounds.forEach(r=>{
    const res=getScoreResult(r.score);
    const fIds=r.session.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p));
    const dW=res.side==='dealer',fW=res.side==='farmer';
    const ds=s[r.dealerId];if(ds){ds.dT++;if(dW)ds.dW++;}
    r.helperIds.forEach(h=>{if(s[h]){s[h].hT++;if(dW)s[h].hW++;}});
    fIds.forEach(f=>{if(s[f]){s[f].fT++;if(fW)s[f].fW++;}});
  });
  const pct=(w,t)=>t===0?'—':Math.round(w/t*100)+'%';
  return ['庄家','帮手','农民'].map((label,i)=>{
    const [wk,tk]=[['dW','dT'],['hW','hT'],['fW','fT']][i];
    return `<div class="card"><div class="card-title">${label}胜率</div>${state.players.map(p=>`<div class="stat-row"><div style="flex:1;font-size:13px">${p.name}</div><div style="font-size:11px;color:var(--text3);margin-right:8px">${s[p.id][wk]}/${s[p.id][tk]}</div><div style="font-family:'Playfair Display';font-size:16px;color:var(--accent2)">${pct(s[p.id][wk],s[p.id][tk])}</div></div>`).join('')}</div>`;
  }).join('');
}

function renderLevelChart() {
  const s=state.currentSession;
  if(!s||!s.rounds.length) return '<div class="empty"><div class="empty-icon">📈</div><p>本局暂无数据</p></div>';
  const colors=['#c8954a','#8b6aaa','#5aaa7a','#d95f5f','#5a9fd4','#d4af6a'];
  const W=Math.max(400,s.rounds.length*48+80),H=180,pad=40,chartH=H-36;
  const history=[{...s.initialLevels}];
  let cur={...s.initialLevels};
  s.rounds.forEach(r=>{const c=computeLevelChanges(r,s);cur=applyLevelChanges(s,c);history.push({...cur});});
  const allKeys=new Set();history.forEach(h=>Object.values(h).forEach(k=>allKeys.add(k)));
  const sortedKeys=[...allKeys].sort((a,b)=>keyIndex(a)-keyIndex(b));
  const yOf=k=>{const i=sortedKeys.indexOf(k);return chartH-(i/Math.max(sortedKeys.length-1,1))*(chartH-20)+8;};
  const xOf=i=>pad+i*(W-pad*2)/Math.max(history.length-1,1);
  const paths=state.players.map((p,pi)=>{
    const pts=history.map((h,i)=>`${xOf(i)},${yOf(h[p.id]||START_KEY)}`);
    const dots=history.map((h,i)=>`<circle cx="${xOf(i)}" cy="${yOf(h[p.id]||START_KEY)}" r="3" fill="${colors[pi]}"/>`).join('');
    return `<polyline points="${pts.join(' ')}" fill="none" stroke="${colors[pi]}" stroke-width="2" opacity=".85"/>${dots}`;
  }).join('');
  const legend=state.players.map((p,pi)=>`<text x="12" y="${14+pi*14}" fill="${colors[pi]}" font-size="10" font-family="Noto Sans SC">${p.name}</text>`).join('');
  const xLabels=history.map((_,i)=>i>0?`<text x="${xOf(i)}" y="${H-2}" fill="var(--text3)" font-size="9" text-anchor="middle">#${i}</text>`:'').join('');
  return `<div class="card"><div class="card-title">级别走势（本局）</div><div class="level-chart"><svg width="${W}" height="${H}" style="overflow:visible">${paths}${legend}${xLabels}</svg></div></div>`;
}

function renderAchStats(allRounds) {
  const ac={};state.players.forEach(p=>ac[p.id]={});
  allRounds.forEach(r=>{(r.achievements||[]).forEach(a=>{if(a.pid!=null){if(!ac[a.pid])ac[a.pid]={};ac[a.pid][a.name]=(ac[a.pid][a.name]||0)+1;}});});
  return state.players.map(p=>{
    const entries=Object.entries(ac[p.id]||{}).sort((a,b)=>b[1]-a[1]);
    if(!entries.length) return '';
    return `<div class="card"><div class="card-title">${p.name}</div>${entries.map(([name,cnt])=>`<div class="stat-row"><div style="flex:1;font-size:13px">${name}</div><div style="font-family:'Playfair Display';font-size:16px;color:var(--accent2)">${cnt}</div></div>`).join('')}</div>`;
  }).join('');
}

// ── SETTINGS ──
function renderSettings() {
  const el = document.getElementById('settingsContent');
  el.innerHTML = `
    <div class="card">
      <div class="card-title">玩家信息 & 座位</div>
      <p style="font-size:11px;color:var(--text3);margin-bottom:10px">用 ▲▼ 调整座位顺序（出牌顺序）</p>
      <div class="seat-list" id="seatList">${renderSeatItems()}</div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
    </div>
    <div class="card">
      <div class="card-title">数据管理</div>
      <div style="display:flex;gap:8px;flex-direction:column">
        <button class="btn btn-secondary btn-full" onclick="exportData()">📤 导出存档 (JSON)</button>
        <label class="btn btn-secondary btn-full" style="cursor:pointer">📥 导入存档
          <input type="file" accept=".json" style="display:none" onchange="importData(this.files[0])">
        </label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">关于</div>
      <p style="font-size:12px;color:var(--text3);line-height:1.7">升级记分册 v3.0<br>六人拖拉机 · 记录 · 统计 · 成就<br>添加到主屏幕以获得最佳体验</p>
    </div>`;
  initDragDrop();
}

function renderSeatItems() {
  const sorted = [...state.players].sort((a,b) => a.seat - b.seat);
  const n = sorted.length;
  return sorted.map((p, i) => {
    const av = p.avatar ? `<img src="${p.avatar}">` : ['🐉','🐯','🦊','🐼','🦁','🐻'][p.id%6];
    return `<div class="seat-item" id="si-${p.id}">
      <div class="seat-move-btns">
        <button class="seat-move-btn" onclick="moveSeat(${p.id},-1)" ${i===0?'disabled':''}>▲</button>
        <button class="seat-move-btn" onclick="moveSeat(${p.id},1)" ${i===n-1?'disabled':''}>▼</button>
      </div>
      <span class="seat-num">座位 ${p.seat+1}</span>
      <div class="seat-avatar" onclick="uploadAvatar(${p.id})">${av}</div>
      <div style="flex:1"><input type="text" value="${p.name}" placeholder="昵称" onchange="updatePlayerName(${p.id},this.value)" style="padding:6px 10px;font-size:13px"></div>
    </div>`;
  }).join('');
}

function moveSeat(pid, dir) {
  const sorted = [...state.players].sort((a,b) => a.seat - b.seat);
  const idx = sorted.findIndex(p => p.id === pid);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const tmp = sorted[idx].seat;
  sorted[idx].seat = sorted[swapIdx].seat;
  sorted[swapIdx].seat = tmp;
  saveState();
  renderSettings();
}

function initDragDrop() {}

// ══════ ACTIONS ══════
function showPage(name, tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(tab) tab.classList.add('active');
  if(name==='round'){resetRoundForm();renderRound();}
  else if(name==='stats') renderStats();
  else if(name==='home') renderHome();
  else if(name==='settings') renderSettings();
}

function openSessionSetup() {
  const c = document.getElementById('setupFirstDealer');
  const sorted = [...state.players].sort((a,b)=>a.seat-b.seat);
  c.innerHTML = sorted.map(p=>`<div class="radio-btn" onclick="selectFirstDealer(${p.id},this)">${p.name}</div>`).join('');
  window._setupFirstDealer = sorted[0].id;
  c.querySelector('.radio-btn').classList.add('selected');
  openModal('modalSessionSetup');
}
function selectFirstDealer(id, el) {
  window._setupFirstDealer = id;
  document.querySelectorAll('#setupFirstDealer .radio-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function startSession() {
  const endLevel = document.getElementById('setupEndLevel').value;
  const endRound = document.getElementById('setupEndRound').value;
  const endKey = endRound + ':' + endLevel;
  const initialLevels = {};
  state.players.forEach(p => initialLevels[p.id] = START_KEY);
  state.currentSession = {
    id: Date.now(), startTime: Date.now(),
    endKey,
    currentDealerId: window._setupFirstDealer ?? state.players[0].id,
    players: state.players.map(p=>p.id),
    playerLevels: {...initialLevels},
    initialLevels: {...initialLevels},
    rounds: []
  };
  saveState(); closeModal('modalSessionSetup'); resetRoundForm(); renderAll(); showToast('新局开始！🀄');
}

function cycleRole(pid) {
  if(roundForm.dealerId===null){roundForm.dealerId=pid;}
  else if(roundForm.dealerId===pid){roundForm.dealerId=null;roundForm.helperIds=roundForm.helperIds.filter(h=>h!==pid);}
  else if(roundForm.helperIds.includes(pid)){roundForm.helperIds=roundForm.helperIds.filter(h=>h!==pid);}
  else if(roundForm.helperIds.length<2){roundForm.helperIds.push(pid);}
  renderRound();
}

function updateScore(val) {
  roundForm.score=parseInt(val);
  document.getElementById('scoreDisp').textContent=roundForm.score;
  document.getElementById('scoreDisp').style.color=getScoreColor(roundForm.score);
  document.getElementById('scoreLabel').textContent=getScoreLabel(roundForm.score);
}

function changeRedFive(type, delta) {
  const arr = type==='heart'?'heartFiveCaptors':'diamondFiveCaptors';
  const newCount = Math.max(0, Math.min(3, roundForm[arr].length + delta));
  roundForm[arr] = roundForm[arr].slice(0, newCount);
  while(roundForm[arr].length < newCount) roundForm[arr].push(null);
  renderRound();
}

function setCaptor(type, idx, pid) {
  const arr = type==='heart'?'heartFiveCaptors':'diamondFiveCaptors';
  roundForm[arr][idx] = pid;
  renderRound();
}

function changePenalty(pid, delta) {
  roundForm.penalties[pid] = Math.max(0, (roundForm.penalties[pid]||0) + delta);
  renderRound();
}

function submitRound() {
  const s = state.currentSession; if(!s) return;
  if(roundForm.dealerId===null){showToast('请选择庄家 ❌');return;}
  if(roundForm.heartFiveCaptors.some(c=>c===null)){showToast('请选择所有♥5的抓牌者 ❌');return;}
  if(roundForm.diamondFiveCaptors.some(c=>c===null)){showToast('请选择所有♦5的抓牌者 ❌');return;}

  const levelsBefore = {...s.playerLevels};
  const rd = {
    dealerId:roundForm.dealerId, helperIds:[...roundForm.helperIds],
    score:roundForm.score, heartFiveCaptors:[...roundForm.heartFiveCaptors],
    diamondFiveCaptors:[...roundForm.diamondFiveCaptors], penalties:{...roundForm.penalties}
  };
  const changes = computeLevelChanges(rd, s);
  const levelsAfter = applyLevelChanges(s, changes);
  const achievements = computeAchievements(rd, s, levelsBefore, levelsAfter);
  const round = {...rd, id:s.rounds.length, achievements, levelsBefore, levelsAfter, changes, timestamp:Date.now()};
  s.rounds.push(round); s.playerLevels = levelsAfter;

  // Advance dealer
  const result = getScoreResult(roundForm.score);
  if(result.side !== 'dealer') {
    const sorted = [...state.players].sort((a,b)=>a.seat-b.seat);
    const ci = sorted.findIndex(p=>p.id===roundForm.dealerId);
    s.currentDealerId = sorted[(ci+1)%sorted.length].id;
  } else { s.currentDealerId = roundForm.dealerId; }

  // Check session end
  let ended = false;
  state.players.forEach(p => { if((levelsAfter[p.id]||'')===s.endKey) ended=true; });

  saveState(); resetRoundForm();
  if(ended){endSession();showToast('🎊 达到终局条件！');}
  else{showToast(`✅ 已记录第${s.rounds.length}局`);}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
  renderHome();
}

function endSession() {
  if(!state.currentSession) return;
  state.sessions.push({...state.currentSession});
  state.currentSession=null; saveState(); renderAll(); showToast('本局已存档 📚');
}

function showRoundDetail(roundId) {
  const s=state.currentSession;if(!s)return;
  const r=s.rounds.find(r=>r.id===roundId);if(!r)return;
  const result=getScoreResult(r.score);
  const bannerCls=result.side==='dealer'?'dealer-win':result.side==='farmer'?'farmer-win':'no-change';
  const bannerTitle=result.side==='dealer'?'庄家方胜利':result.side==='farmer'?'农民方胜利':'平局';
  const helpers=r.helperIds.map(h=>pName(h)).join('、')||'无';
  const farmers=s.players.filter(p=>p!==r.dealerId&&!r.helperIds.includes(p)).map(p=>pName(p)).join('、');
  const levelRows=s.players.map(pid=>{
    const before=r.levelsBefore[pid];const after=r.levelsAfter[pid];const delta=r.changes[pid];
    const arrow=delta>0?`<span style="color:var(--green2)">▲${delta}</span>`:delta<0?`<span style="color:var(--red2)">▼${Math.abs(delta)}</span>`:`<span style="color:var(--text3)">—</span>`;
    return `<div class="stat-row"><div style="flex:1;font-size:13px">${pName(pid)}</div><div style="font-size:12px;color:var(--text3);margin-right:6px">${levelDisplay(before)}→${levelDisplay(after)}</div>${arrow}</div>`;
  }).join('');
  const achTags=(r.achievements||[]).map(a=>`<span class="ach-tag ${a.color}">${a.pid!=null?pName(a.pid)+'·':''}${a.name}</span>`).join('')||'<span style="color:var(--text3);font-size:12px">无成就</span>';
  document.getElementById('roundDetailContent').innerHTML=`
    <div class="modal-title">第 ${roundId+1} 局详情</div>
    <div class="result-banner ${bannerCls}"><div class="result-title">${bannerTitle}</div><div class="result-detail">农民得分：${r.score}</div></div>
    <div class="card-title">人员</div>
    <div style="font-size:13px;margin-bottom:12px">庄家：${pName(r.dealerId)}<br>帮手：${helpers}<br>农民：${farmers}</div>
    <div class="card-title">级别变化</div>${levelRows}
    <div class="card-title" style="margin-top:12px">成就</div>
    <div class="round-achievements" style="margin-bottom:16px">${achTags}</div>
    <button class="btn btn-danger btn-sm" onclick="editRound(${roundId})">✏️ 编辑本局</button>`;
  openModal('modalRoundDetail');
}

function editRound(roundId) {
  const s=state.currentSession;if(!s)return;
  const r=s.rounds.find(r=>r.id===roundId);if(!r)return;
  s.playerLevels={...r.levelsBefore};
  s.rounds=s.rounds.slice(0,roundId);
  roundForm.dealerId=r.dealerId;
  roundForm.helperIds=[...r.helperIds];
  roundForm.score=r.score;
  roundForm.heartFiveCaptors=[...(r.heartFiveCaptors||[])];
  roundForm.diamondFiveCaptors=[...(r.diamondFiveCaptors||[])];
  roundForm.penalties={...r.penalties};
  closeModal('modalRoundDetail'); saveState(); renderRound();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-round').classList.add('active');
  document.querySelectorAll('.nav-tab')[1].classList.add('active');
  showToast('正在编辑 ✏️');
}

function updatePlayerName(pid, name) { state.players[pid].name=name; saveState(); }
let _avatarPid=null;
function uploadAvatar(pid) { _avatarPid=pid; document.getElementById('avatarInput').click(); }
function handleAvatarUpload(e) {
  const file=e.target.files[0];if(!file||_avatarPid===null)return;
  const r=new FileReader();
  r.onload=ev=>{state.players[_avatarPid].avatar=ev.target.result;saveState();renderSettings();renderHome();showToast('头像已更新 ✅');};
  r.readAsDataURL(file);
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadState();
resetRoundForm();
renderAll();
</script>

</html>
